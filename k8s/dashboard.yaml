apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-api
  template:
    metadata:
      labels:
        app: dashboard-api
    spec:
      containers:
        - name: dashboard-api
          image: sentinel-dashboard-api:latest
          ports:
            - containerPort: 4000
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-api
spec:
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: dashboard-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-ui
  template:
    metadata:
      labels:
        app: dashboard-ui
    spec:
      containers:
        - name: dashboard-ui
          image: sentinel-dashboard-ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "http://dashboard-api:4000"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-ui
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: dashboard-ui
