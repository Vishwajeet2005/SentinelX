version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: sentinx-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sentinx-net

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: sentinx-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - sentinx-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: sentinx-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - sentinx-net

  edge-ingest:
    build:
      context: ./server
    container_name: sentinx-edge-ingest
    ports:
      - "8080:8080/udp"
      - "2112:2112"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=sentinx-kafka:29092
      - HMAC_SECRET=${HMAC_SECRET}
    networks:
      - sentinx-net

  clickhouse-sink:
    build:
      context: ./database
    container_name: sentinx-clickhouse-sink
    depends_on:
      - kafka
      - clickhouse
    environment:
      - KAFKA_BROKER=sentinx-kafka:29092
      - CLICKHOUSE_HOST=sentinx-clickhouse
    networks:
      - sentinx-net

  redis:
    image: redis:alpine
    container_name: sentinx-redis
    ports:
      - "6380:6379"
    networks:
      - sentinx-net

  dashboard-api:
    build:
      context: ./dashboard-api
    container_name: sentinx-dashboard-api
    depends_on:
      - kafka
      - redis
    ports:
      - "4000:4000"
    environment:
      - KAFKA_BROKER=sentinx-kafka:29092
      - REDIS_URL=redis://sentinx-redis:6379
      - HMAC_SECRET=${HMAC_SECRET}
      - PORT=4000
    networks:
      - sentinx-net

  dashboard-ui:
    build:
      context: ./dashboard
    container_name: sentinx-dashboard-ui
    ports:
      - "3002:3000"
    environment:
      - VITE_API_URL=http://localhost:4000
    networks:
      - sentinx-net

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sentinx-net

  grafana:
    image: grafana/grafana:latest
    container_name: sentinx-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - sentinx-net

  ml-inference:
    build:
      context: ./ml
      dockerfile: Dockerfile.enterprise
    container_name: sentinx-ml-inference
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=sentinx-kafka:29092
    volumes:
      - ./models:/app/models
    ports:
      - "8001:8000"
    networks:
      - sentinx-net

  mock-client:
    build:
      context: .
      dockerfile: Dockerfile.mockclient
    container_name: sentinx-mock-client
    depends_on:
      - edge-ingest
    environment:
      - EDGE_HOST=edge-ingest
      - EDGE_PORT=8080
      - HMAC_SECRET=${HMAC_SECRET}
    networks:
      - sentinx-net

networks:
  sentinx-net:
    driver: bridge
